<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Soal (Mentor) - FloTest</title>
    <link rel="stylesheet" href="../../../assets/css/style.css">
</head>
<body class="dashboard-page">

    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="logo-box-sidebar">Fl</div>
            <h2>FloTest</h2>
        </div>
        <div class="sidebar-section-title">MENU MENTOR</div>
        <nav class="sidebar-menu">
            <a href="../../dashboard.html" class="sidebar-link">Dashboard</a>
            <a href="../index.html" class="sidebar-link" style="background: #eff6ff; color: #2563eb; border-right-color: #2563eb;">Tests</a>
            <a href="../create.html" class="sidebar-link">Create Test</a>
            <a href="../../../index.html" class="sidebar-link logout-link">Logout</a>
        </nav>
    </aside>

    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>Edit Butir Soal</h1>
            <p>Perbarui teks pertanyaan atau sesuaikan opsi kunci jawaban</p>
        </header>

        <main class="dashboard-main">
            <section class="page-content content-active-default position-relative">
                <h2>Form Perubahan Soal</h2>
                <form action="index.html" method="GET">
                    <div class="form-group">
                        <label>Question Text</label>
                        <textarea rows="3">Berapakah hasil dari operasi hitung matematika berikut: 15 + 5 × 3?</textarea>
                    </div>

                    <div class="form-group">
                        <label>Pilihan A</label>
                        <input type="text" value="60">
                    </div>

                    <div class="form-group">
                        <label>Pilihan B</label>
                        <input type="text" value="45">
                    </div>

                    <div class="form-group">
                        <label>Pilihan C</label>
                        <input type="text" value="30">
                    </div>

                    <div class="form-group">
                        <label>Pilihan D</label>
                        <input type="text" value="23">
                    </div>

                    <div class="form-group">
                        <label>Jawaban Benar</label>
                        <select>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="C" selected>C</option>
                            <option value="D">D</option>
                        </select>
                    </div>

                    <div class="border-divider-top">
                        <button type="submit" class="btn-primary">Update</button>
                        <a href="index.html"><button type="button" class="btn-secondary">Batal</button></a>
                    </div>
                </form>
            </section>
        </main>
    </div>

</body>
</html>
