<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Buat Tes Baru - Mentor</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="dashboard-page">

    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="logo-box-sidebar">Fl</div>
            <h2>FloTest</h2>
        </div>
        <div class="sidebar-section-title">MENU UTAMA</div>
        <nav class="sidebar-menu">
            <a href="dashboard.html" class="sidebar-link">Dashboard</a>
            <a href="tests.html" class="sidebar-link">Daftar Tes</a>
            <a href="create-tests.html" class="sidebar-link" style="background: #eff6ff; color: #2563eb; border-right-color: #2563eb;">Buat Tes</a>
            <hr class="sidebar-divider">
            <a href="../index.html" class="sidebar-link logout-link">Logout</a>
        </nav>
    </aside>

    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>Buat Modul Tes Baru</h1>
            <p>Tambahkan paket soal baru ke dalam sistem</p>
        </header>

        <main class="dashboard-main">
            <div class="page-content" style="opacity: 1; pointer-events: auto; position: relative;">
                <h2>Form Buat Tes</h2>
                <form>
                    <div class="form-group">
                        <label>Judul Tes</label>
                        <input type="text" placeholder="Masukkan judul tes...">
                    </div>
                    <div class="form-group">
                        <label>Deskripsi Tes</label>
                        <textarea placeholder="Masukkan deskripsi lengkap tes..." rows="4"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select>
                            <option value="Draft">Draft</option>
                            <option value="Published">Published</option>
                            <option value="Archived">Archived</option>
                        </select>
                    </div>
                    <button type="button">Simpan</button>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
