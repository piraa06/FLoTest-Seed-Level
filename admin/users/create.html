<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah User Baru - FloTest</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body class="dashboard-page">

    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="logo-box-sidebar">Fl</div>
            <h2>FloTest</h2>
        </div>
        <div class="sidebar-section-title">MENU UTAMA</div>
        <nav class="sidebar-menu">
            <a href="../dashboard.html" class="sidebar-link">Dashboard</a>
            <a href="index.html" class="sidebar-link" style="background: #eff6ff; color: #2563eb; border-right-color: #2563eb;">Users</a>
            <a href="../dashboard.html" class="sidebar-link">Tests</a>
            <a href="../../index.html" class="sidebar-link logout-link">Logout</a>
        </nav>
    </aside>

    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>Tambah User Baru</h1>
            <p>Masukkan identitas lengkap untuk mendaftarkan akun baru</p>
        </header>

        <main class="dashboard-main">
            <section class="page-content content-active-default" style="position: relative;">
                <h2>Form Pembuatan User</h2>
                <form>
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" placeholder="Masukkan nama lengkap...">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" placeholder="Masukkan alamat email...">
                    </div>
                    <div class="form-group">
                        <label>Role</label>
                        <select>
                            <option value="Admin">Admin</option>
                            <option value="Mentor">Mentor</option>
                            <option value="Menti">Menti</option>
                        </select>
                    </div>
                    <div style="margin-top: 15px;">
                        <a href="index.html"><button type="button" style="background: #2563eb; color: white;">Submit</button></a>
                        <a href="index.html"><button type="button" style="background: #e2e8f0; color: #475569;">Batal</button></a>
                    </div>
                </form>
            </section>
        </main>
    </div>

</body>
</html>
