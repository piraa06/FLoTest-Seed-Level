<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Soal - FloTest Admin</title>
    <link rel="stylesheet" href="../../../assets/css/style.css">
</head>
<body class="dashboard-page">

    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="logo-box-sidebar">Fl</div>
            <h2>FloTest</h2>
        </div>
        <div class="sidebar-section-title">MENU UTAMA</div>
        <nav class="sidebar-menu">
            <a href="../../dashboard.html" class="sidebar-link">Dashboard</a>
            <a href="../../users/index.html" class="sidebar-link">Users</a>
            <a href="../index.html" class="sidebar-link" style="background: #eff6ff; color: #2563eb; border-right-color: #2563eb;">Tests</a>
            <a href="../../../index.html" class="sidebar-link logout-link">Logout</a>
        </nav>
    </aside>

    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>Edit Soal</h1>
            <p>Perbarui teks pertanyaan atau pilihan opsi jawaban</p>
        </header>

        <main class="dashboard-main">
            <section class="page-content content-active-default" style="position: relative;">
                <h2>Form Perubahan Soal</h2>
                <form>
                    <div class="form-group">
                        <label>Question Text</label>
                        <textarea rows="3">Apa yang dimaksud dengan variabel dalam dunia pemrograman?</textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>Pilihan A</label>
                        <input type="text" value="GET">
                    </div>
                    <div class="form-group">
                        <label>Pilihan B</label>
                        <input type="text" value="INSERT">
                    </div>
                    <div class="form-group">
                        <label>Pilihan C</label>
                        <input type="text" value="SELECT">
                    </div>
                    <div class="form-group">
                        <label>Pilihan D</label>
                        <input type="text" value="UPDATE">
                    </div>

                    <div class="form-group">
                        <label>Jawaban Benar</label>
                        <select>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="C" selected>C</option>
                            <option value="D">D</option>
                        </select>
                    </div>

                    <div style="margin-top: 15px;">
                        <a href="index.html"><button type="button" style="background: #2563eb; color: white;">Update</button></a>
                        <a href="index.html"><button type="button" style="background: #e2e8f0; color: #475569;">Batal</button></a>
                    </div>
                </form>
            </section>
        </main>
    </div>

</body>
</html>
