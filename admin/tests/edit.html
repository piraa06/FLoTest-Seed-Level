<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Test - FloTest Admin</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body class="dashboard-page">

    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="logo-box-sidebar">Fl</div>
            <h2>FloTest</h2>
        </div>
        <div class="sidebar-section-title">MENU UTAMA</div>
        <nav class="sidebar-menu">
            <a href="../dashboard.html" class="sidebar-link">Dashboard</a>
            <a href="../users/index.html" class="sidebar-link">Users</a>
            <a href="index.html" class="sidebar-link" style="background: #eff6ff; color: #2563eb; border-right-color: #2563eb;">Tests</a>
            <a href="../dashboard.html" class="sidebar-link">Questions</a>
            <hr class="sidebar-divider">
            <a href="../../index.html" class="sidebar-link logout-link">Logout</a>
        </nav>
    </aside>

    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>Edit Paket Test</h1>
            <p>Perbarui informasi detail mengenai modul ujian online</p>
        </header>

        <main class="dashboard-main">
            <section class="page-content content-active-default" style="position: relative;">
                <h2>Form Perubahan Test</h2>
                <form>
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" value="HTML Basic Test">
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea rows="4">Ujian materi dasar mengenai tag semantik HTML, elemen form, dan pembuatan struktur layout website standar dasar.</textarea>
                    </div>
                    <div class="form-group">
                        <label>Select Mentor</label>
                        <select>
                            <option value="1" selected>Budi Utomo (Mentor 1)</option>
                            <option value="2">Siti Aminah (Mentor 2)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select>
                            <option value="Draft">Draft</option>
                            <option value="Published" selected>Published</option>
                            <option value="Archived">Archived</option>
                        </select>
                    </div>
                    <div style="margin-top: 15px;">
                        <a href="index.html"><button type="button" style="background: #2563eb; color: white;">Update</button></a>
                        <a href="index.html"><button type="button" style="background: #e2e8f0; color: #475569;">Batal</button></a>
                    </div>
                </form>
            </section>
        </main>
    </div>

</body>
</html>
