<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — FloTest</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="login-page">

<div class="login-container">
    <div class="login-header">
        <h1>FloTest</h1>
        <p>Platform tes online untuk mentor dan menti</p>
    </div>

    <div class="login-card">
        <h2>Masuk ke Akun</h2>
        <p class="subtitle">Silakan pilih akses masuk sesuai dengan role Anda</p>

        <form onsubmit="return false;">
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="Masukkan email">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Masukkan password">
            </div>

            <div class="form-group">
                <label>Masuk Sebagai</label>
                
                <div class="submit-area" style="display: flex; flex-direction: column; gap: 10px; height: auto;">
                    <a href="admin/dashboard.html" class="btn-actual" style="display: block; position: relative;">Masuk sebagai Admin</a>
                    <a href="mentor/dashboard.html" class="btn-actual" style="display: block; position: relative; background: #1d4ed8;">Masuk sebagai Mentor</a>
                    <a href="menti/dashboard.html" class="btn-actual" style="display: block; position: relative; background: #10b981;">Masuk sebagai Menti</a>
                </div>
            </div>
        </form>
    </div>
</div>

</body>
</html>
