<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kerjakan Tes - Menti</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body class="dashboard-page">

    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="logo-box-sidebar">Fl</div>
            <h2>FloTest</h2>
        </div>
        <div class="sidebar-section-title">MENU UTAMA</div>
        <nav class="sidebar-menu">
            <a href="dashboard.html" class="sidebar-link">Dashboard</a>
            <a href="take-tests.html" class="sidebar-link" style="background: #eff6ff; color: #2563eb; border-right-color: #2563eb;">Kerjakan Tes</a>
            <a href="result.html" class="sidebar-link">Hasil Tes</a>
            <hr class="sidebar-divider">
            <a href="../index.html" class="sidebar-link logout-link">Logout</a>
        </nav>
    </aside>

    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>Lembar Ujian Online</h1>
            <p>Jawablah pertanyaan berikut dengan teliti sebelum menekan tombol submit</p>
        </header>

        <main class="dashboard-main">
            <div class="page-content" style="opacity: 1; pointer-events: auto; position: relative;">
                <h2>HTML Basic Test</h2>
                <div class="quiz-container" style="margin-top: 20px;">
                    <p style="font-size: 16px; font-weight: 600; color: #0f172a; margin-bottom: 20px;">
                        Pertanyaan: <br>Apa fungsi HTML?
                    </p>
                    <div class="quiz-options" style="margin-bottom: 30px;">
                        <label style="font-weight: 500; display: flex; align-items: center; margin-bottom: 12px; cursor: pointer;">
                            <input type="radio" name="q1" value="A"> A. HyperText Markup Language
                        </label>
                        <label style="font-weight: 500; display: flex; align-items: center; margin-bottom: 12px; cursor: pointer;">
                            <input type="radio" name="q1" value="B"> B. HyperText Markdown Language
                        </label>
                        <label style="font-weight: 500; display: flex; align-items: center; margin-bottom: 12px; cursor: pointer;">
                            <input type="radio" name="q1" value="C"> C. HighText Machine Language
                        </label>
                        <label style="font-weight: 500; display: flex; align-items: center; margin-bottom: 12px; cursor: pointer;">
                            <input type="radio" name="q1" value="D"> D. Home Tool Markup Language
                        </label>
                    </div>
                    <div class="quiz-navigation">
                        <button type="button">Sebelumnya</button>
                        <button type="button">Selanjutnya</button>
                        <button type="button" onclick="window.location.href='result.html';" style="background: #059669; color: white; float: right; margin-right: 0;">Submit</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
